<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Everton GPS PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <style>
        :root {
            --bg-void: #0a0d12;
            --bg-panel: #131820;
            --bg-raised: #1a212b;
            --border: rgba(255,255,255,.08);
            --signal: #00ffa6;
            --telemetry: #2dd4ff;
            --danger: #ff5470;
            --amber: #ffb020;
            --ink-100: #eef2f6;
            --ink-500: #74808f;
            --sans: -apple-system,'Segoe UI',Roboto,sans-serif;
            --mono: monospace;
        }
        body {
            margin: 0; padding: 0;
            font-family: var(--sans);
            background-color: var(--bg-void);
            color: var(--ink-100);
            display: flex; height: 100vh;
            overflow: hidden;
        }

        /* TELA DE LOGIN (SOBREPOSTA) */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-void); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            background: var(--bg-panel); border: 1px solid var(--border);
            padding: 32px; border-radius: 12px; width: 100%; max-width: 360px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
        }
        .login-box h2 { margin: 0 0 8px 0; color: var(--signal); }
        .login-box p { margin: 0 0 24px 0; color: var(--ink-500); font-size: 0.85em; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 0.8em; color: var(--ink-500); margin-bottom: 6px; }
        .input-group input {
            width: 100%; background: var(--bg-raised); border: 1px solid var(--border);
            padding: 10px; border-radius: 6px; color: white; box-sizing: border-box;
        }
        .input-group input:focus { border-color: var(--telemetry); outline: none; }
        .btn-login {
            width: 100%; background: var(--signal); color: var(--bg-void); font-weight: bold;
            border: none; padding: 12px; border-radius: 6px; cursor: pointer; transition: 0.2s;
        }
        .btn-login:hover { opacity: 0.9; }
        #loginErro { color: var(--danger); font-size: 0.85em; margin-top: 12px; text-align: center; line-height: 1.4; }

        /* INTERFACE DO MAPA (SÓ APARECE APÓS LOGAR) */
        #appContainer { display: none; width: 100%; height: 100%; }

        #sidebar {
            width: 340px; background: var(--bg-panel); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; z-index: 10; flex-shrink: 0;
        }
        .sidebar-header { padding: 16px; background: var(--bg-raised); border-bottom: 1px solid var(--border); position: relative; }
        .sidebar-header h2 { margin: 0; font-size: 1.2em; color: var(--signal); }
        .sidebar-header span { font-size: 0.75em; color: var(--ink-500); font-family: var(--mono); }
        .btn-logout { position: absolute; right: 16px; top: 18px; background: none; border: none; color: var(--danger); cursor: pointer; font-size: 0.8em; }

        #listaVeiculos { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .card-veiculo { background: var(--bg-raised); border: 1px solid var(--border); border-radius: 8px; padding: 12px; cursor: pointer; }
        .card-title { display: flex; justify-content: space-between; font-weight: bold; font-size: 0.95em; }
        .card-status { font-size: 0.7em; padding: 2px 6px; border-radius: 4px; background: rgba(0,255,166,0.1); color: var(--signal); font-weight: bold; }
        .card-status.parado { background: rgba(255,84,112,0.1); color: var(--danger); }
        .card-body { font-size: 0.78em; color: var(--ink-500); margin-top: 6px; line-height: 1.4; }

        .stops-timeline { margin-top: 10px; padding-top: 8px; border-top: 1px dashed var(--border); }
        .stops-title { font-size: 0.72em; color: var(--amber); font-weight: bold; margin-bottom: 4px; display: block; }
        .stop-item { font-size: 0.72em; color: var(--ink-100); padding: 3px 0; }

        #map { flex: 1; height: 100%; background: var(--bg-void); }

        .pin-parado { background-color: var(--danger); border: 2px solid white; border-radius: 50%; }
        .pin-movimento { background-color: var(--signal); border: 2px solid white; border-radius: 50%; }
        .pin-historico-parada { background-color: var(--amber); border: 1.5px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; }

        /* Legenda de velocidade */
        .legenda-velocidade {
            position: absolute; bottom: 20px; right: 10px; z-index: 500;
            background: var(--bg-panel); border: 1px solid var(--border);
            padding: 10px 12px; border-radius: 8px; font-size: 0.72em;
            color: var(--ink-100); box-shadow: 0 4px 14px rgba(0,0,0,.4);
        }
        .legenda-velocidade div { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
        .legenda-cor { width: 14px; height: 4px; border-radius: 2px; display: inline-block; }

        .popup-ponto { font-family: var(--sans); font-size: 0.82em; line-height: 1.5; }
        .popup-ponto b { color: #2dd4ff; }

        @media (max-width: 768px) {
            #appContainer { flex-direction: column; }
            #sidebar { width: 100%; height: 45vh; border-right: none; border-bottom: 1px solid var(--border); }
            #map { width: 100%; height: 55vh; }
        }
    </style>
</head>
<body>

<!-- TELA DE LOGIN OBRIGATÓRIA -->
<div id="loginOverlay">
    <div class="login-box">
        <h2>Everton GPS</h2>
        <p>Painel de Monitoramento de Frota</p>
        <div class="input-group">
            <label>E-mail Corporativo</label>
            <input type="email" id="emailInput" placeholder="seu@email.com">
        </div>
        <div class="input-group">
            <label>Senha de Acesso</label>
            <input type="password" id="senhaInput" placeholder="******">
        </div>
        <button class="btn-login" id="btnEntrar">Entrar no Painel</button>
        <div id="loginErro"></div>
    </div>
</div>

<!-- CONTAINER PRINCIPAL DO MAPA -->
<div id="appContainer">
    <div id="sidebar">
        <div class="sidebar-header">
            <h2>Everton GPS Admin</h2>
            <span id="contadorFrota">Carregando frota...</span>
            <button class="btn-logout" id="btnSair">Sair</button>
        </div>
        <div id="listaVeiculos"></div>
    </div>
    <div id="map"></div>
</div>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
var firebaseConfig = {
    apiKey: "AIzaSyDwKIS8wL3D7OuaysVFV_xyAsFsKo2eXzY",
    authDomain: "everton-gps.firebaseapp.com",
    databaseURL: "https://everton-gps-default-rtdb.firebaseio.com",
    projectId: "everton-gps",
    storageBucket: "everton-gps.firebasestorage.app",
    messagingSenderId: "688936933095",
    appId: "1:688936933095:web:790b2407334e8b148e3442",
    measurementId: "G-X14EWTZNRD"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();
var auth = firebase.auth();

var map = L.map('map', { zoomControl: true, attributionControl: false }).setView([-29.6133, -52.1919], 13);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

// Legenda fixa de velocidade
var legenda = L.control({position: 'bottomright'});
legenda.onAdd = function() {
    var div = L.DomUtil.create('div', 'legenda-velocidade');
    div.innerHTML = `
        <div><span class="legenda-cor" style="background:#ff5470"></span> Parado (0 km/h)</div>
        <div><span class="legenda-cor" style="background:#ffb020"></span> Até 20 km/h</div>
        <div><span class="legenda-cor" style="background:#2dd4ff"></span> 20-40 km/h</div>
        <div><span class="legenda-cor" style="background:#00ffa6"></span> 40-60 km/h</div>
        <div><span class="legenda-cor" style="background:#a855f7"></span> Acima de 60 km/h</div>
    `;
    return div;
};
legenda.addTo(map);

var marcadoresAtivos = {};
var segmentosTrajeto = {};   // agora é um array de polylines por veículo (um por trecho de velocidade)
var marcadoresParadas = {};
var ultimosPontosContados = {};
var coresAtribuidas = {};
var coresRotas = ['#2dd4ff', '#00ffa6', '#ffb020', '#ff5470', '#a855f7'];
var indiceCor = 0;
var firebaseListener = null;
var cacheEndereco = {}; // evita repetir geocodificação reversa pro mesmo ponto

function obterCorVeiculo() { return coresRotas[indiceCor++ % coresRotas.length]; }

function corPorVelocidade(v) {
    if (v <= 2) return '#ff5470';
    if (v <= 20) return '#ffb020';
    if (v <= 40) return '#2dd4ff';
    if (v <= 60) return '#00ffa6';
    return '#a855f7';
}

function formatarDataHora(timestampOuStr, horaFallback) {
    // Aceita timestamp em ms, string ISO, ou usa hora simples já salva
    if (!timestampOuStr) return horaFallback || '--:--';
    var d;
    if (typeof timestampOuStr === 'number') d = new Date(timestampOuStr);
    else d = new Date(timestampOuStr);
    if (isNaN(d.getTime())) return horaFallback || '--:--';
    var dia = String(d.getDate()).padStart(2,'0');
    var mes = String(d.getMonth()+1).padStart(2,'0');
    var ano = d.getFullYear();
    var hh = String(d.getHours()).padStart(2,'0');
    var mm = String(d.getMinutes()).padStart(2,'0');
    var ss = String(d.getSeconds()).padStart(2,'0');
    return `${dia}/${mes}/${ano} ${hh}:${mm}:${ss}`;
}

/* =========================================================
   GEOCODIFICAÇÃO REVERSA (Nominatim) — rua, bairro, cidade, UF
   ========================================================= */
async function obterEndereco(lat, lon) {
    var chave = lat.toFixed(5) + ',' + lon.toFixed(5);
    if (cacheEndereco[chave]) return cacheEndereco[chave];

    try {
        var url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`;
        var resp = await fetch(url, { headers: { 'Accept-Language': 'pt-BR' } });
        var data = await resp.json();
        var addr = data.address || {};
        var endereco = {
            rua: addr.road || addr.pedestrian || addr.residential || 'Rua não identificada',
            bairro: addr.suburb || addr.neighbourhood || addr.village || '—',
            cidade: addr.city || addr.town || addr.municipality || '—',
            uf: addr.state_code || (addr.state ? addr.state.substring(0,2).toUpperCase() : '—')
        };
        cacheEndereco[chave] = endereco;
        return endereco;
    } catch (e) {
        return { rua: 'Não disponível', bairro: '—', cidade: '—', uf: '—' };
    }
}

/* =========================================================
   CONTROLE DE ACESSO (AUTHENTICATION)
   ========================================================= */
auth.onAuthStateChanged(function(user) {
    if (user) {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('appContainer').style.display = 'flex';
        map.invalidateSize();

        var empresaIdLimpo = user.email.replace(/[^a-zA-Z0-9]/g, "_");
        inicializarMonitoramento(empresaIdLimpo);
    } else {
        document.getElementById('loginOverlay').style.display = 'flex';
        document.getElementById('appContainer').style.display = 'none';
        if (firebaseListener) firebaseListener.off();
        limparMapaCompleto();
    }
});

document.getElementById('btnEntrar').addEventListener('click', function() {
    var email = document.getElementById('emailInput').value.trim();
    var senha = document.getElementById('senhaInput').value;
    var erroDiv = document.getElementById('loginErro');
    erroDiv.textContent = "";

    if(!email || !senha) {
        erroDiv.textContent = "Por favor, preencha todos os campos.";
        return;
    }

    erroDiv.style.color = "var(--telemetry)";
    erroDiv.textContent = "Conectando ao Firebase...";

    auth.signInWithEmailAndPassword(email, senha).catch(function(error) {
        console.error(error);
        erroDiv.style.color = "var(--danger)";

        if (error.code === "auth/wrong-password") {
            erroDiv.textContent = "Senha incorreta para este usuário.";
        } else if (error.code === "auth/user-not-found") {
            erroDiv.textContent = "Este e-mail não está cadastrado no Firebase.";
        } else if (error.code === "auth/invalid-email") {
            erroDiv.textContent = "Formato de e-mail inválido.";
        } else {
            erroDiv.textContent = "Erro: " + error.message;
        }
    });
});

document.getElementById('btnSair').addEventListener('click', function() {
    auth.signOut();
});

function limparMapaCompleto() {
    Object.keys(marcadoresAtivos).forEach(id => map.removeLayer(marcadoresAtivos[id]));
    Object.keys(segmentosTrajeto).forEach(id => {
        segmentosTrajeto[id].forEach(seg => map.removeLayer(seg));
    });
    Object.keys(marcadoresParadas).forEach(id => marcadoresParadas[id].forEach(m => map.removeLayer(m)));
    marcadoresAtivos = {}; segmentosTrajeto = {}; marcadoresParadas = {}; ultimosPontosContados = {};
}

/* =========================================================
   SNAKE TO ROADS (OSRM MAP MATCHING) + COR POR VELOCIDADE
   + POPUP COM RUA / BAIRRO / CIDADE / UF / DATA / HORA
   ========================================================= */
async function desenhoRotaNasRuas(vID, pontosBrutos, cor) {
    if (pontosBrutos.length < 2) return;

    // Limita a 90 pontos por chamada (limite prático do serviço público de match)
    var amostra = pontosBrutos.slice(-90);
    var coordsStr = amostra.map(p => p.lon + ',' + p.lat).join(';');
    var radiusesStr = amostra.map(() => '25').join(';'); // tolerância de 25m para colar na via

    var url = `https://router.project-osrm.org/match/v1/driving/${coordsStr}` +
              `?geometries=geojson&overview=full&radiuses=${radiusesStr}&tidy=true`;

    try {
        var res = await fetch(url);
        var data = await res.json();
        if (data.code !== 'Ok' || !data.matchings || !data.matchings[0]) return;

        // Remove segmentos antigos desse veículo
        if (segmentosTrajeto[vID]) {
            segmentosTrajeto[vID].forEach(seg => map.removeLayer(seg));
        }
        segmentosTrajeto[vID] = [];

        // O "tracepoints" relaciona cada ponto bruto a uma posição na rota casada.
        // Usamos a geometria casada como linha-base e colorimos por trechos
        // usando a velocidade do ponto bruto mais próximo de cada trecho.
        var coordenadasRua = data.matchings[0].geometry.coordinates.map(c => [c[1], c[0]]);

        // Divide a linha em pequenos trechos coloridos conforme a velocidade
        // associada ao ponto bruto correspondente (aproximação por proporção).
        var totalBrutos = amostra.length;
        var totalRua = coordenadasRua.length;

        for (var i = 0; i < totalRua - 1; i++) {
            var proporcao = i / totalRua;
            var indiceBruto = Math.min(totalBrutos - 1, Math.floor(proporcao * totalBrutos));
            var velocidadeRef = parseFloat(amostra[indiceBruto].velocidade || 0);
            var corTrecho = corPorVelocidade(velocidadeRef);

            var trecho = L.polyline(
                [coordenadasRua[i], coordenadasRua[i + 1]],
                { color: corTrecho, weight: 5, opacity: 0.9 }
            ).addTo(map);

            segmentosTrajeto[vID].push(trecho);
        }

        // Adiciona popups com endereço completo + data/hora em alguns pontos-chave
        // (a cada ~10 pontos brutos, para não sobrecarregar com requisições)
        for (var j = 0; j < amostra.length; j += 10) {
            var ponto = amostra[j];
            var endereco = await obterEndereco(ponto.lat, ponto.lon);
            var dataHoraFormatada = formatarDataHora(ponto.timestamp, ponto.hora);
            var velocidadePonto = parseFloat(ponto.velocidade || 0);

            var marcadorInfo = L.circleMarker([ponto.lat, ponto.lon], {
                radius: 4,
                color: corPorVelocidade(velocidadePonto),
                fillColor: corPorVelocidade(velocidadePonto),
                fillOpacity: 0.9,
                weight: 1
            }).addTo(map);

            marcadorInfo.bindPopup(`
                <div class="popup-ponto">
                    <b>Veículo:</b> ${vID}<br>
                    <b>Velocidade:</b> ${velocidadePonto} km/h<br>
                    <b>Data/Hora:</b> ${dataHoraFormatada}<br>
                    <b>Rua:</b> ${endereco.rua}<br>
                    <b>Bairro:</b> ${endereco.bairro}<br>
                    <b>Cidade:</b> ${endereco.cidade}<br>
                    <b>UF:</b> ${endereco.uf}
                </div>
            `);

            segmentosTrajeto[vID].push(marcadorInfo);
        }

    } catch (e) {
        console.error('Erro no map matching:', e);
    }
}

function inicializarMonitoramento(empresaIdCliente) {
    var refVeiculos = db.ref('veiculos');

    firebaseListener = refVeiculos.orderByChild('atual/empresaId').equalTo(empresaIdCliente);

    firebaseListener.on('value', function(snapshot) {
        var veiculos = snapshot.val();
        var listaContainer = document.getElementById('listaVeiculos');
        listaContainer.innerHTML = "";

        if (!veiculos) {
            document.getElementById('contadorFrota').textContent = "Frota: 0 veículos";
            listaContainer.innerHTML = '<div style="color:var(--ink-500); padding:10px; font-size:0.85em; text-align:center;">Nenhum veículo vinculado a esta conta.<br><br><small>Verifique se o campo "empresaId" no banco possui exatamente o valor: <br><b style="color:white;">' + empresaIdCliente + '</b></small></div>';
            return;
        }

        document.getElementById('contadorFrota').textContent = "Frota: " + Object.keys(veiculos).length + " veículo(s)";

        Object.keys(veiculos).forEach(function(vID) {
            var dadosAtual = veiculos[vID].atual;
            var lat = dadosAtual.lat;
            var lon = dadosAtual.lon;
            var vel = parseFloat(dadosAtual.velocidade || 0);
            var hora = dadosAtual.hora || "--:--";

            var estaParado = vel <= 2;
            var iconClass = estaParado ? 'pin-parado' : 'pin-movimento';
            var customIcon = L.divIcon({ className: iconClass, iconSize: [16, 16], iconAnchor: [8, 8] });

            if (marcadoresAtivos[vID]) {
                marcadoresAtivos[vID].setLatLng([lat, lon]).setIcon(customIcon);
            } else {
                marcadoresAtivos[vID] = L.marker([lat, lon], { icon: customIcon }).addTo(map);
            }

            // Popup do marcador atual também traz endereço + data/hora
            obterEndereco(lat, lon).then(endereco => {
                var dataHoraAtual = formatarDataHora(dadosAtual.timestamp, hora);
                marcadoresAtivos[vID].bindPopup(`
                    <div class="popup-ponto">
                        <b>Veículo:</b> ${vID}<br>
                        <b>Status:</b> ${estaParado ? 'PARADO' : 'EM MOVIMENTO'}<br>
                        <b>Velocidade:</b> ${vel} km/h<br>
                        <b>Data/Hora:</b> ${dataHoraAtual}<br>
                        <b>Rua:</b> ${endereco.rua}<br>
                        <b>Bairro:</b> ${endereco.bairro}<br>
                        <b>Cidade:</b> ${endereco.cidade}<br>
                        <b>UF:</b> ${endereco.uf}
                    </div>
                `);
            });

            if (!coresAtribuidas[vID]) coresAtribuidas[vID] = obterCorVeiculo();

            var htmlParadasTimeline = "";
            if (!marcadoresParadas[vID]) marcadoresParadas[vID] = [];

            if (veiculos[vID].historico) {
                var pontosBrutos = [];
                var paradasEncontradas = [];
                Object.keys(veiculos[vID].historico).forEach(ch => {
                    var p = veiculos[vID].historico[ch];
                    pontosBrutos.push({
                        lat: p.lat,
                        lon: p.lon,
                        velocidade: p.velocidade || 0,
                        hora: p.hora,
                        timestamp: p.timestamp || null
                    });
                    if (parseFloat(p.velocidade || 0) === 0 && p.rua) {
                        paradasEncontradas.push(p);
                    }
                });

                marcadoresParadas[vID].forEach(m => map.removeLayer(m));
                marcadoresParadas[vID] = [];

                paradasEncontradas.slice(-3).forEach(pStop => {
                    var mStop = L.marker([pStop.lat, pStop.lon], { icon: L.divIcon({ className: 'pin-historico-parada', html: '🛑', iconSize: [18, 18] }) }).addTo(map);
                    var dataHoraParada = formatarDataHora(pStop.timestamp, pStop.hora);
                    mStop.bindPopup(`
                        <div class="popup-ponto">
                            <b>Parada de:</b> ${vID}<br>
                            <b>Data/Hora:</b> ${dataHoraParada}<br>
                            <b>Rua:</b> ${pStop.rua}<br>
                            <b>Bairro:</b> ${pStop.bairro || '—'}<br>
                            <b>Cidade:</b> ${pStop.cidade || '—'}<br>
                            <b>UF:</b> ${pStop.uf || '—'}
                        </div>
                    `);
                    marcadoresParadas[vID].push(mStop);
                    htmlParadasTimeline += `<div class="stop-item">⏱️ ${dataHoraParada} - 📍 ${pStop.rua}, ${pStop.bairro || ''}</div>`;
                });

                if (ultimosPontosContados[vID] !== pontosBrutos.length) {
                    ultimosPontosContados[vID] = pontosBrutos.length;
                    desenhoRotaNasRuas(vID, pontosBrutos, coresAtribuidas[vID]);
                }
            }

            var card = document.createElement('div');
            card.className = 'card-veiculo';
            card.style.borderLeft = "5px solid " + coresAtribuidas[vID];
            card.innerHTML = `
                <div class="card-title"><span>🚗 ${vID}</span><span class="card-status ${estaParado?'parado':''}">${estaParado?'PARADO':'MOVIMENTO'}</span></div>
                <div class="card-body"><b>Velocidade:</b> ${vel} km/h | <b>Sinal:</b> ${hora}<br><b>Local:</b> ${dadosAtual.endereco || 'Rua pública'}</div>
                ${htmlParadasTimeline ? `<div class="stops-timeline"><span class="stops-title">📍 Paradas:</span>${htmlParadasTimeline}</div>` : ''}
            `;
            card.onclick = () => { map.flyTo([lat, lon], 17); marcadoresAtivos[vID].openPopup(); };
            listaContainer.appendChild(card);
        });
    });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rastreador Everton GPS - Multi-Frota</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <style>
        :root {
            --bg-main: #0a0d12;
            --bg-card: #131820;
            --border: rgba(255,255,255,.08);
            --signal-on: #00ffa6;
            --signal-off: #ffb020;
            --danger: #ff5470;
            --telemetry: #2dd4ff;
            --text: #eef2f6;
            --text-dim: #74808f;
        }
        body {
            margin: 0; padding: 0; font-family: system-ui, sans-serif;
            background: var(--bg-main); color: var(--text);
            display: flex; flex-direction: column; height: 100vh;
        }
        #map { width: 100%; height: 32vh; background: #000; }
        .container { padding: 16px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }

        .input-box { background: var(--bg-card); border: 1px solid var(--border); padding: 12px; border-radius: 8px; }
        .input-box label { font-size: 0.75em; text-transform: uppercase; color: var(--text-dim); display: block; margin-bottom: 6px; font-weight: bold; }
        .row { display: flex; gap: 8px; }
        input { flex: 1; background: #1a212b; border: 1px solid var(--border); padding: 12px; border-radius: 6px; color: white; font-size: 1em; }
        button { background: var(--signal-on); color: #000; border: none; padding: 12px 20px; font-weight: bold; border-radius: 6px; cursor: pointer; }

        .frota-container { background: var(--bg-card); border: 1px solid var(--border); padding: 12px; border-radius: 8px; }
        .frota-lista { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .tag-veiculo { background: #1a212b; border: 1px solid var(--border); padding: 6px 12px; border-radius: 20px; font-size: 0.85em; display: flex; align-items: center; gap: 8px; }
        .btn-remover { color: var(--danger); cursor: pointer; font-weight: bold; border: none; background: none; padding: 0; font-size: 1.1em; }

        .status-bar { padding: 12px; border-radius: 6px; text-align: center; font-weight: bold; font-size: 0.9em; }
        .status-online { background: rgba(0, 255, 166, 0.15); color: var(--signal-on); border: 1px solid var(--signal-on); }
        .status-offline { background: rgba(255, 176, 32, 0.15); color: var(--signal-off); border: 1px solid var(--signal-off); }
        .status-erro { background: rgba(255, 84, 112, 0.15); color: var(--danger); border: 1px solid var(--danger); }

        .btn-row { display: flex; gap: 8px; }
        .btn-force { background: #2dd4ff; color: #000; flex: 2; padding: 14px; font-size: 0.95em; text-transform: uppercase; font-weight: bold; border-radius: 6px; border: none; cursor: pointer; }
        .btn-export { background: #1a212b; color: var(--text); border: 1px solid var(--border); flex: 1; padding: 14px; font-size: 0.85em; font-weight: bold; border-radius: 6px; cursor: pointer; }

        .telemetry-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
        .telemetry-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.9em; gap: 8px; }
        .telemetry-row b, .telemetry-row span { text-align: right; }
        .telemetry-row:last-child { border-bottom: none; }

        .badge { font-size: 0.75em; padding: 3px 8px; border-radius: 4px; font-weight: bold; }
        .badge-movimento { background: rgba(0,255,166,0.15); color: var(--signal-on); }
        .badge-parado { background: rgba(255,176,32,0.15); color: var(--signal-off); }
        .badge-perigo { background: rgba(255,84,112,0.15); color: var(--danger); }

        .gps-warning { background: rgba(255,84,112,0.12); border: 1px solid var(--danger); color: var(--danger); padding: 10px 12px; border-radius: 6px; font-size: 0.85em; display: none; }

        .fila-info { font-size: 0.75em; color: var(--text-dim); text-align: center; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="container">

    <div id="avisoGps" class="gps-warning"></div>

    <div class="input-box">
        <label>Cadastrar Novo Veículo na Lista</label>
        <div class="row">
            <input type="text" id="veiculoInput" placeholder="Ex: NISSAN ISA, FIAT UNO">
            <button id="btnAdicionar">Adicionar</button>
        </div>
    </div>

    <div class="frota-container">
        <div style="font-size: 0.75em; color: var(--text-dim); text-transform: uppercase; font-weight: bold;">Veículos Monitorados Neste Aparelho</div>
        <div class="frota-lista" id="listaFrotaLocal"></div>
    </div>

    <div id="statusConexao" class="status-bar status-offline">
        MODO OFFLINE — gravando localmente no aparelho <span id="contadorPendentes">(0 pendentes)</span>
    </div>
    <div class="fila-info" id="filaInfo"></div>

    <div class="btn-row">
        <button id="btnForcar" class="btn-force">📡 Forçar Sincronização</button>
        <button id="btnExportar" class="btn-export">⬇️ Exportar Rota (CSV)</button>
    </div>
    <button id="btnDiagnostico" class="btn-export" style="width:100%;">🔍 Testar Conexão com Serviço de Endereço</button>
    <div id="diagnosticoResultado" class="fila-info" style="text-align:left; white-space:pre-wrap; word-break:break-word;"></div>

    <div class="telemetry-card">
        <div style="font-size: 0.75em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; font-weight: bold;">Última Telemetria Gerada</div>
        <div class="telemetry-row"><span>Situação</span><span id="badStatus" class="badge badge-parado">PARADO</span></div>
        <div class="telemetry-row"><span>Velocidade</span><b id="txtVelocidade">0 km/h</b></div>
        <div class="telemetry-row"><span>Precisão GPS</span><b id="txtPrecisao">—</b></div>
        <div class="telemetry-row"><span>Tempo de Parada</span><b id="txtTempoParado">00:00:00</b></div>
        <div class="telemetry-row"><span>Coordenadas</span><b id="txtCoords">—</b></div>
        <div class="telemetry-row"><span>Rua</span><b id="txtRua">—</b></div>
        <div class="telemetry-row"><span>Bairro</span><b id="txtBairro">—</b></div>
        <div class="telemetry-row"><span>Cidade</span><b id="txtCidade">—</b></div>
        <div class="telemetry-row"><span>Estado (UF)</span><b id="txtEstado">—</b></div>
        <div class="telemetry-row"><span>Data</span><b id="txtData">—</b></div>
        <div class="telemetry-row"><span>Horário do último ponto</span><span id="txtHora" style="color:var(--telemetry)">—</span></div>
        <div class="telemetry-row"><span>🌡️ Temperatura no local</span><b id="txtTemperatura">—</b></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ===================== CONFIGURAÇÃO =====================
var firebaseConfig = {
    apiKey: "AIzaSyDwKIS8wL3D7OuaysVFV_xyAsFsKo2eXzY",
    authDomain: "everton-gps.firebaseapp.com",
    databaseURL: "https://everton-gps-default-rtdb.firebaseio.com",
    projectId: "everton-gps",
    storageBucket: "everton-gps.firebasestorage.app",
    messagingSenderId: "688936933095",
    appId: "1:688936933095:web:790b2407334e8b148e3442"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

var LIMITE_VELOCIDADE = 80;
var EMPRESA_ID = "tricolordosul5x0_gmail_com";

// Nominatim pede no máximo ~1 requisição por segundo. Respeitamos isso
// processando um ponto de cada vez, em ordem, sem pular nenhum.
var INTERVALO_GEOCODIFICACAO_MS = 1100;
var MAX_TENTATIVAS_GEOCODIFICACAO = 3;
var TIMEOUT_FETCH_MS = 8000;

// Chamada de rede com timeout — evita que um fetch travado prenda a fila para sempre
function fetchComTimeout(url, opcoes, timeoutMs) {
    var controller = new AbortController();
    var id = setTimeout(() => controller.abort(), timeoutMs);
    return fetch(url, Object.assign({}, opcoes, { signal: controller.signal }))
        .finally(() => clearTimeout(id));
}

// ===================== AVISO DE CONTEXTO INSEGURO (HTTP) =====================
function checarContextoSeguro() {
    var seguro = window.isSecureContext || location.hostname === "localhost" || location.hostname === "127.0.0.1";
    if (!seguro) {
        mostrarAvisoGps("⚠️ Esta página precisa estar em HTTPS para acessar o GPS. Abra-a por um link https:// para que a localização funcione.");
        return false;
    }
    return true;
}
function mostrarAvisoGps(msg) {
    var box = document.getElementById('avisoGps');
    box.textContent = msg;
    box.style.display = "block";
}
function esconderAvisoGps() {
    document.getElementById('avisoGps').style.display = "none";
}

// ===================== MAPA =====================
var map = L.map('map', { zoomControl: false }).setView([-29.6133, -52.1919], 13);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap'
}).addTo(map);
var marcador = L.marker([-29.6133, -52.1919]).addTo(map);
var circuloPrecisao = L.circle([-29.6133, -52.1919], { radius: 0, color: '#2dd4ff', fillOpacity: 0.1, weight: 1 }).addTo(map);
// Linha "crua": liga os pontos de GPS direto, sem seguir ruas (fica reta entre pontos distantes)
var polilinhaRota = L.polyline([], {color: 'rgba(45,212,255,0.35)', weight: 3, opacity: 0.6, dashArray: '4,6'}).addTo(map);
// Linha "encaixada nas ruas": desenhada pelo OSRM seguindo o traçado real das vias
var polilinhaRuas = L.polyline([], {color: '#2dd4ff', weight: 6, opacity: 0.95}).addTo(map);

// ===================== ESTADO PERSISTENTE =====================
var listaVeiculos = JSON.parse(localStorage.getItem('frota_veiculos') || "[]");
var filaPendentes = JSON.parse(localStorage.getItem('fila_rastreio') || "[]");
var filaGeocodificarDepois = JSON.parse(localStorage.getItem('fila_geocodificar') || "[]");
var historicoCoordenadasLocais = JSON.parse(localStorage.getItem('historico_coords') || "[]");
// Registro completo da rota real: cada ponto com data/hora/endereço, para consulta e exportação
var registroCompleto = JSON.parse(localStorage.getItem('registro_completo') || "[]");

if (historicoCoordenadasLocais.length > 0) {
    polilinhaRota.setLatLngs(historicoCoordenadasLocais);
    var ultimo = historicoCoordenadasLocais[historicoCoordenadasLocais.length - 1];
    map.setView(ultimo, 16);
    marcador.setLatLng(ultimo);
}

function salvarTudo() {
    localStorage.setItem('frota_veiculos', JSON.stringify(listaVeiculos));
    localStorage.setItem('fila_rastreio', JSON.stringify(filaPendentes));
    localStorage.setItem('fila_geocodificar', JSON.stringify(filaGeocodificarDepois));
    localStorage.setItem('historico_coords', JSON.stringify(historicoCoordenadasLocais));
    // Limita o registro completo para não estourar o armazenamento local
    if (registroCompleto.length > 5000) registroCompleto = registroCompleto.slice(-5000);
    localStorage.setItem('registro_completo', JSON.stringify(registroCompleto));
}

// ===================== CADASTRO DE VEÍCULOS =====================
function renderizarFrotaLocal() {
    var container = document.getElementById('listaFrotaLocal');
    container.innerHTML = "";
    if (listaVeiculos.length === 0) {
        container.innerHTML = "<span style='color:var(--text-dim); font-size:0.85em;'>Nenhum veículo adicionado ainda.</span>";
        return;
    }
    listaVeiculos.forEach((nome, index) => {
        var tag = document.createElement('div');
        tag.className = "tag-veiculo";
        tag.innerHTML = `🚗 <b>${nome}</b> <button class="btn-remover" onclick="removerVeiculo(${index})">×</button>`;
        container.appendChild(tag);
    });
}

document.getElementById('btnAdicionar').addEventListener('click', function() {
    var nome = document.getElementById('veiculoInput').value.trim().toUpperCase();
    if (!nome) return alert('Digite um identificador!');
    if (listaVeiculos.includes(nome)) return alert('Esse veículo já está cadastrado!');

    listaVeiculos.push(nome);
    salvarTudo();
    document.getElementById('veiculoInput').value = "";
    renderizarFrotaLocal();
    processarFilaGeocodificacao();
    enviarDadosFila();
});

window.removerVeiculo = function(index) {
    if (confirm(`Remover o veículo ${listaVeiculos[index]} da lista local?`)) {
        listaVeiculos.splice(index, 1);
        salvarTudo();
        renderizarFrotaLocal();
    }
};

// ===================== TEMPO PARADO =====================
var tempoParadoSegundos = parseInt(localStorage.getItem('tempo_parado_seg') || "0");
setInterval(function() {
    if (document.getElementById('badStatus').textContent === "PARADO") {
        tempoParadoSegundos++;
        localStorage.setItem('tempo_parado_seg', tempoParadoSegundos);
    } else {
        tempoParadoSegundos = 0;
        localStorage.setItem('tempo_parado_seg', "0");
    }
    var hrs = Math.floor(tempoParadoSegundos / 3600).toString().padStart(2, '0');
    var mins = Math.floor((tempoParadoSegundos % 3600) / 60).toString().padStart(2, '0');
    var segs = (tempoParadoSegundos % 60).toString().padStart(2, '0');
    document.getElementById('txtTempoParado').textContent = `${hrs}:${mins}:${segs}`;
}, 1000);

// ===================== CAPTURA DE GPS (FUNCIONA OFFLINE) =====================
function iniciarRastreioGps() {
    if (!checarContextoSeguro()) return;

    if (!navigator.geolocation) {
        mostrarAvisoGps("⚠️ Este navegador não suporta geolocalização.");
        return;
    }

    navigator.geolocation.watchPosition(function(position) {
        esconderAvisoGps();

        var lat = position.coords.latitude;
        var lon = position.coords.longitude;
        var precisao = position.coords.accuracy ? Math.round(position.coords.accuracy) : null;
        var vel = position.coords.speed ? Math.round(position.coords.speed * 3.6) : 0;
        var agora = new Date();

        map.setView([lat, lon], map.getZoom() < 14 ? 16 : map.getZoom());
        marcador.setLatLng([lat, lon]);
        if (precisao) {
            circuloPrecisao.setLatLng([lat, lon]);
            circuloPrecisao.setRadius(precisao);
        }

        historicoCoordenadasLocais.push([lat, lon]);
        if (historicoCoordenadasLocais.length > 2000) historicoCoordenadasLocais.shift();
        polilinhaRota.setLatLngs(historicoCoordenadasLocais);
        agendarEncaixeNasRuas();
        talvezBuscarTemperatura(lat, lon);

        document.getElementById('txtVelocidade').textContent = vel + " km/h";
        document.getElementById('txtData').textContent = agora.toLocaleDateString('pt-BR');
        document.getElementById('txtHora').textContent = agora.toLocaleTimeString('pt-BR');
        document.getElementById('txtPrecisao').textContent = precisao ? `± ${precisao} m` : "—";
        document.getElementById('txtCoords').textContent = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
        document.getElementById('txtRua').textContent = "Buscando...";
        document.getElementById('txtBairro').textContent = "Buscando...";
        document.getElementById('txtCidade').textContent = "Buscando...";
        document.getElementById('txtEstado').textContent = "Buscando...";

        var situacao = "EM MOVIMENTO";
        var badgeStatus = document.getElementById('badStatus');
        if (vel <= 2) {
            situacao = "PARADO";
            badgeStatus.textContent = "PARADO";
            badgeStatus.className = "badge badge-parado";
        } else if (vel > LIMITE_VELOCIDADE) {
            situacao = "VELOCIDADE ACIMA DO LIMITE";
            badgeStatus.textContent = "EXCESSO DE VELOCIDADE";
            badgeStatus.className = "badge badge-perigo";
        } else {
            badgeStatus.textContent = "EM MOVIMENTO";
            badgeStatus.className = "badge badge-movimento";
        }

        // Cada ponto real capturado entra na fila — nenhum é descartado.
        filaGeocodificarDepois.push({
            lat: lat, lon: lon, velocidade: vel, status: situacao,
            tempoParado: document.getElementById('txtTempoParado').textContent,
            hora: agora.toLocaleTimeString('pt-BR'),
            data: agora.toLocaleDateString('pt-BR'),
            ts: agora.getTime()
        });
        salvarTudo();
        atualizarInterfaceEstado();

        processarFilaGeocodificacao();

    }, function(erro) {
        console.error(erro);
        var msg;
        switch (erro.code) {
            case erro.PERMISSION_DENIED:
                msg = "⚠️ Permissão de localização negada. Ative o GPS nas permissões do navegador/app para este site.";
                break;
            case erro.POSITION_UNAVAILABLE:
                msg = "⚠️ Sinal de GPS indisponível no momento. Tente em área aberta.";
                break;
            case erro.TIMEOUT:
                msg = "⚠️ Tempo esgotado tentando obter localização. Tentando novamente...";
                break;
            default:
                msg = "⚠️ Erro de localização: " + erro.message;
        }
        mostrarAvisoGps(msg);
    }, { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 });
}

iniciarRastreioGps();

// ===================== ENCAIXE DA ROTA NAS RUAS (MAP MATCHING) =====================
// Usa o serviço público de roteamento OSRM para "colar" os pontos brutos de GPS
// no traçado real das vias, em vez de conectá-los com linha reta.
var encaixeAgendado = false;
var ultimoEncaixeTs = 0;
var INTERVALO_MIN_ENCAIXE_MS = 4000;

function agendarEncaixeNasRuas() {
    var agora = Date.now();
    var esperar = Math.max(0, INTERVALO_MIN_ENCAIXE_MS - (agora - ultimoEncaixeTs));
    if (encaixeAgendado) return;
    encaixeAgendado = true;
    setTimeout(executarEncaixeNasRuas, esperar);
}

function executarEncaixeNasRuas() {
    encaixeAgendado = false;
    ultimoEncaixeTs = Date.now();

    if (historicoCoordenadasLocais.length < 2) return;

    // OSRM aceita um número limitado de pontos por requisição — usa os últimos 100
    var pontos = historicoCoordenadasLocais.slice(-100);
    var coordsStr = pontos.map(p => p[1].toFixed(6) + "," + p[0].toFixed(6)).join(";");
    var url = `https://router.project-osrm.org/match/v1/driving/${coordsStr}?overview=full&geometries=geojson&radiuses=${pontos.map(()=>25).join(";")}`;

    fetchComTimeout(url, {}, TIMEOUT_FETCH_MS)
        .then(res => res.json())
        .then(data => {
            if (data.code === "Ok" && data.matchings && data.matchings.length > 0) {
                // Junta a geometria de todos os trechos casados, na ordem
                var pontosRua = [];
                data.matchings.forEach(m => {
                    m.geometry.coordinates.forEach(c => pontosRua.push([c[1], c[0]]));
                });
                polilinhaRuas.setLatLngs(pontosRua);
            }
            // Se falhar o encaixe, a linha pontilhada (rota crua) continua visível — nada trava.
        })
        .catch(err => console.warn("Encaixe nas ruas indisponível agora:", err));
}

// ===================== TERMÔMETRO (TEMPERATURA NO LOCAL) =====================
// Usa a Open-Meteo (gratuita, sem chave de API) para mostrar a temperatura
// atual no ponto onde o veículo está.
var ultimaBuscaTempTs = 0;
var buscandoTemp = false;
var INTERVALO_MIN_TEMPERATURA_MS = 5 * 60 * 1000; // a cada 5 minutos é suficiente para clima

function talvezBuscarTemperatura(lat, lon) {
    var agora = Date.now();
    if (buscandoTemp || (agora - ultimaBuscaTempTs) < INTERVALO_MIN_TEMPERATURA_MS) return;
    buscandoTemp = true;
    ultimaBuscaTempTs = agora;

    var url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`;
    fetchComTimeout(url, {}, TIMEOUT_FETCH_MS)
        .then(res => {
            if (!res.ok) throw new Error("HTTP " + res.status);
            return res.json();
        })
        .then(data => {
            if (data && data.current_weather && typeof data.current_weather.temperature === "number") {
                document.getElementById('txtTemperatura').textContent = data.current_weather.temperature.toFixed(1) + " °C";
            }
        })
        .catch(err => {
            console.warn("Falha ao buscar temperatura:", err);
            // Não trava nada — só deixa o valor anterior (ou "—") na tela
        })
        .finally(() => { buscandoTemp = false; });
}

// ===================== GEOCODIFICAÇÃO (RUA/BAIRRO/CIDADE/ESTADO) =====================
// Processa em ORDEM (FIFO), um ponto por vez, sem pular nenhum — assim a rota
// real fica registrada completa, com endereço de cada ponto, não só do último.
var geocodificando = false;
function processarFilaGeocodificacao() {
    if (geocodificando || filaGeocodificarDepois.length === 0) return;
    geocodificando = true;
    atualizarInterfaceEstado();

    var ponto = filaGeocodificarDepois[0];

    fetchComTimeout(
        `https://nominatim.openstreetmap.org/reverse?lat=${ponto.lat}&lon=${ponto.lon}&format=json&zoom=18&addressdetails=1`,
        { headers: { 'Accept-Language': 'pt-BR' } },
        TIMEOUT_FETCH_MS
    )
        .then(res => {
            if (!res.ok) throw new Error("HTTP " + res.status);
            return res.json();
        })
        .then(data => {
            var addr = data.address || {};
            var rua = addr.road || addr.pedestrian || addr.footway || "Rua não localizada";
            var bairro = addr.suburb || addr.neighbourhood || addr.quarter || "Bairro não localizado";
            var cidade = addr.city || addr.town || addr.village || addr.municipality || "Cidade não localizada";
            var estado = addr.state || "Estado não localizado";
            gravarPontoProcessado(ponto, rua, bairro, cidade, estado);
            filaGeocodificarDepois.shift();
        })
        .catch(err => {
            console.warn("Falha ao buscar endereço:", err);
            ponto.tentativas = (ponto.tentativas || 0) + 1;
            // Mostra o erro real na tela para diagnóstico (em vez de "Buscando..." eterno)
            if (ponto === filaGeocodificarDepois[filaGeocodificarDepois.length - 1]) {
                var msgErro = "Erro: " + (err && err.name ? err.name + " - " : "") + (err && err.message ? err.message : String(err));
                document.getElementById('txtRua').textContent = msgErro;
                document.getElementById('txtBairro').textContent = "(tentativa " + ponto.tentativas + "/" + MAX_TENTATIVAS_GEOCODIFICACAO + ")";
            }
            if (ponto.tentativas >= MAX_TENTATIVAS_GEOCODIFICACAO) {
                // Desiste deste ponto específico (sem travar os pontos seguintes),
                // mas mantém coordenadas exatas registradas — só o nome da rua fica indisponível.
                gravarPontoProcessado(ponto, "Endereço indisponível", "—", "—", "—");
                filaGeocodificarDepois.shift();
                mostrarAvisoGps("⚠️ Não foi possível buscar o endereço de alguns pontos (sem resposta do serviço de mapas). As coordenadas foram salvas normalmente.");
            }
            // Se ainda não atingiu o máximo de tentativas, o ponto continua na fila e será tentado de novo.
        })
        .finally(() => {
            geocodificando = false;
            salvarTudo();
            atualizarInterfaceEstado();
            enviarDadosFila();
            if (filaGeocodificarDepois.length > 0) {
                setTimeout(processarFilaGeocodificacao, INTERVALO_GEOCODIFICACAO_MS);
            }
        });
}

function gravarPontoProcessado(ponto, rua, bairro, cidade, estado) {
    // Atualiza a tela sempre que o ponto processado for o mais recente da fila local
    if (ponto === filaGeocodificarDepois[filaGeocodificarDepois.length - 1]) {
        document.getElementById('txtRua').textContent = rua;
        document.getElementById('txtBairro').textContent = bairro;
        document.getElementById('txtCidade').textContent = cidade;
        document.getElementById('txtEstado').textContent = estado;
    }

    var registro = {
        lat: ponto.lat, lon: ponto.lon,
        velocidade: ponto.velocidade, status: ponto.status,
        tempoParado: ponto.tempoParado,
        hora: ponto.hora, data: ponto.data,
        rua: rua, bairro: bairro, cidade: cidade, estado: estado,
        endereco: `${rua}, ${bairro} - ${cidade}/${estado}`
    };
    registroCompleto.push(registro);

    if (listaVeiculos.length > 0) {
        listaVeiculos.forEach(vNome => {
            filaPendentes.push(Object.assign({ vID: vNome, empresaId: EMPRESA_ID }, registro));
        });
    }
}

// ===================== ENVIO PARA O FIREBASE =====================
var enviando = false;
function enviarDadosFila() {
    if (enviando || filaPendentes.length === 0) {
        atualizarInterfaceEstado();
        return;
    }
    enviando = true;

    var pacoteAtual = filaPendentes[0];
    var targetVeiculo = pacoteAtual.vID;
    var refAtual = db.ref('veiculos/' + targetVeiculo + '/atual');
    var refHist = db.ref('veiculos/' + targetVeiculo + '/historico').push();

    refAtual.set(pacoteAtual)
        .then(() => refHist.set(pacoteAtual))
        .then(() => {
            filaPendentes.shift();
            salvarTudo();
        })
        .catch((error) => console.warn("Falha ao enviar, mantendo na fila:", error))
        .finally(() => {
            enviando = false;
            atualizarInterfaceEstado();
            if (filaPendentes.length > 0) enviarDadosFila();
        });
}

function atualizarInterfaceEstado() {
    var barra = document.getElementById('statusConexao');
    var totalPendente = filaPendentes.length + filaGeocodificarDepois.length;

    if (navigator.onLine && totalPendente === 0) {
        barra.className = "status-bar status-online";
        barra.innerHTML = "📡 SISTEMA ONLINE — Todos os veículos sincronizados!";
    } else if (navigator.onLine) {
        barra.className = "status-bar status-online";
        barra.innerHTML = `📡 ONLINE — sincronizando... <span id="contadorPendentes">(${totalPendente} pendentes)</span>`;
    } else {
        barra.className = "status-bar status-offline";
        barra.innerHTML = `MODO OFFLINE — gravando localmente no aparelho <span id="contadorPendentes">(${totalPendente} pendentes)</span>`;
    }

    document.getElementById('filaInfo').textContent =
        registroCompleto.length + " pontos da rota real registrados neste aparelho";
}

window.addEventListener('online', function() {
    esconderAvisoGps();
    atualizarInterfaceEstado();
    processarFilaGeocodificacao();
    enviarDadosFila();
    agendarEncaixeNasRuas();
});
window.addEventListener('offline', atualizarInterfaceEstado);

document.getElementById('btnForcar').addEventListener('click', function() {
    processarFilaGeocodificacao();
    enviarDadosFila();
});

// ===================== EXPORTAR ROTA REAL (CSV) =====================
document.getElementById('btnExportar').addEventListener('click', function() {
    if (registroCompleto.length === 0) {
        alert("Ainda não há pontos de rota registrados para exportar.");
        return;
    }
    var linhas = ["Data;Hora;Latitude;Longitude;Velocidade(km/h);Situacao;Rua;Bairro;Cidade;Estado"];
    registroCompleto.forEach(p => {
        linhas.push([p.data, p.hora, p.lat, p.lon, p.velocidade, p.status, p.rua, p.bairro, p.cidade, p.estado].join(";"));
    });
    var blob = new Blob([linhas.join("\n")], { type: "text/csv;charset=utf-8;" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "rota_real_" + new Date().toISOString().slice(0,10) + ".csv";
    a.click();
    URL.revokeObjectURL(url);
});

document.getElementById('btnDiagnostico').addEventListener('click', function() {
    var out = document.getElementById('diagnosticoResultado');
    out.textContent = "Testando... (aguarde até 10s)";
    var inicio = Date.now();

    fetchComTimeout(
        "https://nominatim.openstreetmap.org/reverse?lat=-29.6133&lon=-52.1919&format=json&zoom=18&addressdetails=1",
        { headers: { 'Accept-Language': 'pt-BR' } },
        10000
    )
        .then(res => {
            out.textContent += "\nHTTP status: " + res.status;
            return res.text();
        })
        .then(txt => {
            var ms = Date.now() - inicio;
            out.textContent = "✅ SUCESSO em " + ms + "ms\n\nResposta bruta:\n" + txt.slice(0, 500);
        })
        .catch(err => {
            var ms = Date.now() - inicio;
            out.textContent = "❌ FALHOU após " + ms + "ms\n\nTipo: " + (err && err.name) + "\nMensagem: " + (err && err.message);
        });
});

renderizarFrotaLocal();
atualizarInterfaceEstado();
checarContextoSeguro();

// Rede de segurança: tenta novamente a cada 6s, mesmo que eventos 'online'
// não disparem corretamente ou navigator.onLine esteja incorreto no aparelho.
setInterval(function() {
    if (filaGeocodificarDepois.length > 0) processarFilaGeocodificacao();
    if (filaPendentes.length > 0) enviarDadosFila();
    if (historicoCoordenadasLocais.length >= 2) agendarEncaixeNasRuas();
}, 6000);

</script>
